apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: saphira-ingress
  namespace: saphira-sovereign-core
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: saphira-service
            port:
              number: 8000

---
apiVersion: v1
kind: Service
metadata:
  name: saphira-service
  namespace: saphira-sovereign-core
spec:
  selector:
    app: saphira-core
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  type: ClusterIP