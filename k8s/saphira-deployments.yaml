apiVersion: apps/v1
kind: Deployment
metadata:
  name: saphira-core-deployment
  namespace: saphira-sovereign-core
spec:
  replicas: 2
  selector:
    matchLabels:
      app: saphira-core
  template:
    metadata:
      labels:
        app: saphira-core
    spec:
      containers:
      - name: saphira-core
        image: ghcr.io/novaumbrella/saphira-core-engine:latest
        ports:
        - containerPort: 8000
        env:
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: saphira-config
              key: app_env