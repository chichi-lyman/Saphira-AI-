apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: saphira-multi-region-routing
  namespace: saphira-sovereign-core
  annotations:
    # AWS Route53 or Google Cloud HTTP(S) Load Balancer integration
    kubernetes.io/ingress.class: "gce-multi-cluster"
    networking.gke.io/managed-certificates: "saphira-multi-region-cert"
    networking.gke.io/v1beta1.FrontendConfig: "saphira-frontend-config"
spec:
  rules:
  - host: ://api.novaumbrella.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: saphira-core-srv
            port:
              number: 8080

---
# CLUSTER GLOBAL FAILOVER CONFIGURATION
apiVersion: networking.gke.io/v1
kind: MultiClusterService
metadata:
  name: saphira-core-srv
  namespace: saphira-sovereign-core
spec:
  template:
    spec:
      selector:
        app: saphira-core
      ports:
      - name: http
        protocol: TCP
        port: 8080
        targetPort: 8080

---
# REDIS CROSS-REGION REPLICATION
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-cluster-conf
  namespace: saphira-sovereign-core
data:
  redis-replica.conf: |-
    replicaof saphira-cache-primary.saphira-sovereign-core.svc.cluster.local 6379
    masterauth $(REDIS_PASSWORD)
    requirepass $(REDIS_PASSWORD)
    appendonly yes
