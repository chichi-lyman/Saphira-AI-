user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Production Log Format Optimization
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off; # Mask version

    # Upstream definition for internal routing
    upstream saphira_backend {
        server saphira_core:8080;
    }

    server {
        listen 443 ssl http2;
        server_name ://novaumbrella.com;

        # Production SSL Configuration (Let's Encrypt / Nova Umbrella Certs)
        ssl_certificate /etc/nginx/ssl/live/://novaumbrella.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/://novaumbrella.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;

        # Security Headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none';" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Primary API & WebSocket Entrypoint Route
        location /saphira/telemetry {
            proxy_pass http://saphira_backend;
            
            # Protocol Upgrade Headers for WebSockets
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            
            # Standard Ingress Proxy Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # Extended Timeouts for Persistent Sovereign AI Streaming Channels
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Catch-all route for regular HTTP API calls
        location / {
            proxy_pass http://saphira_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # Global HTTP to HTTPS Redirection Block
    server {
        listen 80;
        server_name ://novaumbrella.com;
        return 301 https://$server_name$request_uri;
    }
}
