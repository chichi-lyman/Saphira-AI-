version: '3.8'
services:
  # --- SECURE EDGE INGRESS LAYER ---
  saphira_gateway:
    image: nginx:1.25-alpine
    container_name: saphira_ingress_gateway
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/nginx/ssl:ro
    depends_on:
      - saphira_core
    networks:
      - saphira_public_network
      - saphira_internal_network

  # --- INGRESS LAYER: CORE ENGINE ---
  saphira_core:
    image: novaumbrella/saphira-core:latest
    container_name: saphira_core_engine
    restart: unless-stopped
    expose:
      - "8080" # Exposed internally, no longer open to the host machine port
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://:${REDIS_PASSWORD}@saphira_cache:6379/0
      - SKILL_STORE_PATH=/data/saphira_skill_store.json
    volumes:
      - saphira_shared_data:/data
    depends_on:
      - saphira_cache
    networks:
      - saphira_internal_network

  # --- CACHE & GATEKEEPER LAYER ---
  saphira_cache:
    image: redis:7.2-alpine
    container_name: saphira_cache_layer
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - saphira_redis_state:/data
    networks:
      - saphira_internal_network

  # --- CRUCIBLE WORKER MANAGER: EPHEMERAL SANDBOX ENGINE (DooD) ---
  saphira_sandbox_manager:
    image: novaumbrella/saphira-sandbox-manager:latest
    container_name: saphira_sandbox_orchestrator
    restart: unless-stopped
    user: "1000:1000" # Run as a non-root system user inside the manager container
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - SANDBOX_MEMORY_LIMIT=128m
      - SANDBOX_CPU_QUOTA=50000
      - WORKER_IMAGE=novaumbrella/saphira-runtime-worker:latest
    depends_on:
      - saphira_core
    networks:
      - saphira_internal_network
networks:
  saphira_public_network:
    driver: bridge
  saphira_internal_network:
    driver: bridge
    internal: true # Totally cuts off state/worker elements from direct internet peering
volumes:
  saphira_shared_data:
    driver: local
  saphira_redis_state:
    driver: local
